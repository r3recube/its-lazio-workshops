<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Cars</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">🏍️🚗 Garage Manager</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="bikes.html">Bikes</a></li>
        <li class="nav-item"><a class="nav-link" href="cars.html">Cars</a></li>
        <li class="nav-item"><a class="nav-link" href="garages.html">Garages</a></li>
      </ul>
    </div>
  </nav>
  <main class="container py-4">
    <h2>🚗 Cars</h2>
    <form id="car-form" class="row g-2 mb-4">
      <div class="col"><input class="form-control" name="brand" placeholder="Brand" required></div>
      <div class="col"><input class="form-control" name="model" placeholder="Model" required></div>
      <div class="col"><input class="form-control" name="fuelType" placeholder="Fuel type" required></div>
      <div class="col"><input type="number" class="form-control" name="doors" placeholder="Doors" required></div>
      <div class="col"><input type="number" class="form-control" name="seats" placeholder="Seats" required></div>
      <div class="col"><input type="number" class="form-control" name="year" placeholder="Year" required></div>
      <div class="col"><input type="number" step="0.01" class="form-control" name="price" placeholder="Price" required></div>
      <div class="col-auto"><button class="btn btn-success">Add</button></div>
    </form>
    <div id="error-msg" class="alert alert-danger d-none"></div>
    <table class="table table-striped">
      <thead><tr>
        <th>ID</th><th>Brand</th><th>Model</th><th>Fuel</th><th>Doors</th><th>Seats</th><th>Year</th><th>Price</th><th></th>
      </tr></thead>
      <tbody id="cars-table"></tbody>
    </table>
  </main>
  <script src="js/app.js"></script>
  <script>renderList('cars', 'cars-table', 'car-form', 'error-msg');</script>
</body>
</html>
